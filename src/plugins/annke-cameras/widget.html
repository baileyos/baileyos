<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annke Cameras</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    color: #eceef3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 16px;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .header h2 {
    color: #ffce6a;
    font-size: 18px;
    font-weight: 600;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
  }
  .status-dot.online { background: #22c55e; }
  .status-dot.offline { background: #ef4444; }
  .status-dot.mock { background: #f59e0b; }
  .camera-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 1fr;
    gap: 8px;
    width: 100%;
    aspect-ratio: 2.2 / 1;
  }
  .camera-cell {
    background: rgba(20, 22, 30, 0.9);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .camera-cell:hover {
    border-color: #ffce6a;
  }
  .camera-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .camera-cell .label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 16px 8px 6px;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .camera-cell .cam-name {
    color: #ffce6a;
    font-weight: 600;
  }
  .camera-cell .cam-time {
    color: rgba(255,255,255,0.4);
    font-size: 10px;
  }
  .camera-cell .offline-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    color: #666;
    font-size: 12px;
  }
  /* Stream overlay */
  .stream-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .stream-overlay.active { display: flex; }
  .stream-overlay .stream-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
  }
  .stream-overlay .stream-title {
    color: #ffce6a;
    font-size: 16px;
    font-weight: 600;
  }
  .stream-overlay .stream-close {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    color: #e0e0e0;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .stream-overlay .stream-close:hover { background: rgba(255,255,255,0.2); }
  .stream-overlay .quality-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .quality-toggle button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #999;
    padding: 4px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }
  .quality-toggle button.active {
    background: rgba(212,168,83,0.2);
    border-color: #ffce6a;
    color: #ffce6a;
  }
  .stream-overlay img {
    max-width: 90vw;
    max-height: 70vh;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  /* header polish — dark glass bar (matches Audio/Lights) */
  .header { background: rgba(20,22,30,0.82) !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 14px !important; padding: 12px 16px !important; }
  .header h1, .header h2, .header .title { background: linear-gradient(90deg, #ffe6b0, #ffc64d); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
</style>
</head>
<body>

<div class="header">
  <h2>Security Cameras</h2>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="statusBadge"><span class="status-dot offline"></span>Loading...</div>
    <button onclick="window.open('/plugins/annke-cameras/zone-editor.html','_blank','width=1200,height=750,resizable=yes')" style="background:rgba(255,206,106,0.12);border:1px solid #ffce6a;color:#ffce6a;padding:5px 13px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">✏ Zone Editor</button>
  </div>
</div>

<div class="camera-grid" id="cameraGrid"></div>

<div class="stream-overlay" id="streamOverlay">
  <div class="stream-header">
    <span class="stream-title" id="streamTitle">Camera</span>
    <button class="stream-close" onclick="closeStream()">Close</button>
  </div>
  <div class="quality-toggle">
    <button id="btnHD" onclick="switchQuality(0)">HD</button>
    <button id="btnSD" class="active" onclick="switchQuality(1)">SD</button>
  </div>
  <img id="streamImg" src="" alt="Live Stream" style="display:none">
  <video id="streamVideo" autoplay playsinline muted controls style="display:none;max-width:90vw;max-height:70vh;border-radius:8px;border:1px solid rgba(255,255,255,0.1)"></video>
</div>

<script>
  const grid = document.getElementById('cameraGrid');
  const overlay = document.getElementById('streamOverlay');
  const streamImg = document.getElementById('streamImg');
  const streamVideo = document.getElementById('streamVideo');
  const streamTitle = document.getElementById('streamTitle');
  const btnHD = document.getElementById('btnHD');
  const btnSD = document.getElementById('btnSD');
  const statusBadge = document.getElementById('statusBadge');

  let state = null;
  let activeStreamChannel = null;
  let activeStreamIsReolink = false;
  let activeStreamQuality = 1;
  let refreshTimer = null;

  function timeAgo(ts) {
    if (!ts) return '';
    const sec = Math.floor((Date.now() - ts) / 1000);
    if (sec < 10) return 'just now';
    if (sec < 60) return sec + 's ago';
    if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
    return Math.floor(sec / 3600) + 'h ago';
  }

  function renderGrid(data) {
    state = data;
    const channels = data.channels || [];
    const dot = data.mockMode ? 'mock' : (data.online ? 'online' : 'offline');
    const label = data.mockMode ? 'Mock Mode' : (data.online ? 'Online' : 'Offline');
    statusBadge.innerHTML = '<span class="status-dot ' + dot + '"></span>' + label;

    grid.innerHTML = '';
    channels.forEach(function(ch) {
      const cell = document.createElement('div');
      cell.className = 'camera-cell';
      cell.onclick = function() { openStream(ch.id, ch.name, ch.isReolink, ch.hlsUrl); };

      if (ch.online && ch.hasSnapshot) {
        var img = document.createElement('img');
        img.src = ch.snapshotUrl + '?t=' + Date.now();
        img.alt = ch.name;
        img.onerror = function() { this.style.display = 'none'; };
        cell.appendChild(img);
      } else {
        var offDiv = document.createElement('div');
        offDiv.className = 'offline-overlay';
        offDiv.textContent = ch.online ? 'No snapshot' : 'Offline';
        cell.appendChild(offDiv);
      }

      var labelDiv = document.createElement('div');
      labelDiv.className = 'label';
      labelDiv.innerHTML = '<span class="cam-name">' + ch.name + '</span><span class="cam-time">' + timeAgo(ch.lastSnapshotTime) + '</span>';
      cell.appendChild(labelDiv);
      grid.appendChild(cell);
    });
  }

  function openStream(channel, name, isReolink, hlsUrl) {
    activeStreamChannel = channel;
    activeStreamIsReolink = !!isReolink;
    activeStreamQuality = 1;
    streamTitle.textContent = name + ' - Live';

    if (isReolink) {
      // HLS via <video> — quality toggle not applicable
      streamImg.style.display = 'none';
      streamVideo.style.display = 'block';
      btnHD.style.display = 'none';
      btnSD.style.display = 'none';
      streamVideo.src = hlsUrl || ('/api/reolink-cameras/hls/' + channel.replace('reolink-', '') + '/index.m3u8');
      streamVideo.load();
      streamVideo.play().catch(function() {});
    } else {
      streamVideo.style.display = 'none';
      streamVideo.src = '';
      streamImg.style.display = 'block';
      btnHD.style.display = '';
      btnSD.style.display = '';
      btnSD.classList.add('active');
      btnHD.classList.remove('active');
      streamImg.src = '/api/cameras/stream/' + channel + '?stream=1';
    }
    overlay.classList.add('active');
  }

  function closeStream() {
    overlay.classList.remove('active');
    streamImg.src = '';
    streamImg.style.display = 'none';
    streamVideo.src = '';
    streamVideo.style.display = 'none';
    btnHD.style.display = '';
    btnSD.style.display = '';
    activeStreamChannel = null;
    activeStreamIsReolink = false;
  }

  function switchQuality(q) {
    if (!activeStreamChannel || activeStreamIsReolink) return;
    activeStreamQuality = q;
    btnHD.classList.toggle('active', q === 0);
    btnSD.classList.toggle('active', q === 1);
    streamImg.src = '/api/cameras/stream/' + activeStreamChannel + '?stream=' + q;
  }

  async function fetchState() {
    try {
      const [annkeRes, reolinkRes] = await Promise.all([
        fetch('/api/cameras/state'),
        fetch('/api/reolink-cameras/state').catch(function() { return null; }),
      ]);
      const data = await annkeRes.json();

      if (reolinkRes && reolinkRes.ok) {
        const rd = await reolinkRes.json();
        (rd.cameras || []).forEach(function(rc, i) {
          var slot = {
            id: 'reolink-' + rc.id,
            name: rc.name,
            online: rc.online,
            hasSnapshot: rc.hasSnapshot,
            snapshotUrl: '/api/reolink-cameras/snapshot/' + rc.id,
            hlsUrl: '/api/reolink-cameras/hls/' + rc.id + '/index.m3u8',
            lastSnapshotTime: rc.lastSnapshotTime,
            isReolink: true,
          };
          // Replace Annke channel 5 (index 4) with first Reolink; subsequent at end
          var targetIndex = i === 0 ? 4 : (data.channels.length + i);
          if (data.channels && targetIndex < data.channels.length) {
            data.channels[targetIndex] = slot;
          } else if (data.channels) {
            data.channels.push(slot);
          }
        });
      }

      renderGrid(data);
    } catch (e) {
      statusBadge.innerHTML = '<span class="status-dot offline"></span>Connection error';
    }
  }

  fetchState();
  refreshTimer = setInterval(fetchState, 10000);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeStream();
  });
</script>
</body>
</html>
